name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # 2️⃣ Setup Node.js for Angular build
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'   # Angular 21 works fine with Node 18

      # 3️⃣ Optional: Setup .NET only if you have an API
      # Uncomment if you add a .NET API in api_location
      #- name: Setup .NET
      #  uses: actions/setup-dotnet@v4
      #  with:
      #    dotnet-version: '8.0.x'

      # 4️⃣ Install dependencies
      - name: Install Angular dependencies
        working-directory: ./browser
        run: npm install

      # 5️⃣ Build Angular app
      - name: Build Angular app
        working-directory: ./browser
        run: npm run build -- --configuration production

      # 6️⃣ Deploy to Azure Static Web Apps
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_OCEAN_0D52BA010 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./browser"     # Angular source folder
          api_location: ""              # No API folder for now
          output_location: "dist/browser"  # Angular production output

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_OCEAN_0D52BA010 }}
          action: "close"
